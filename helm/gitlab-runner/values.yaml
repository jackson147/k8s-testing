## The GitLab Server URL
gitlabUrl: https://gitlab.com/

## Configure the pods that will actually run the CI jobs
runners:
  secret: gitlab-runner-secret
  config: |
    [[runners]]
      name = "k3s-hybrid-runner"
      url = "https://gitlab.com/"
      executor = "kubernetes"
      # This tag is for the 'manager' pod; the actual jobs use tags defined below
      [runners.kubernetes]
        namespace = "gitlab-runner"
        image = "alpine:latest"
        privileged = true  # Required for Docker-in-Docker (builds)
        
        ## CPU/Memory requests for the build pods
        cpu_requests = "500m"
        memory_requests = "512Mi"

      ## Define the two "virtual" runners inside this one config
      ## This allows one Helm release to handle both x86 and ARM
      
    [[runners]]
      name = "x86-worker"
      executor = "kubernetes"
      tags = "x86"
      [runners.kubernetes]
        [runners.kubernetes.node_selector]
          "kubernetes.io/arch" = "amd64"

    [[runners]]
      name = "arm-worker"
      executor = "kubernetes"
      tags = "arm64"
      [runners.kubernetes]
        [runners.kubernetes.node_selector]
          "kubernetes.io/arch" = "arm64"

## Ensure the 'Manager' pod stays on your more powerful x86 node
nodeSelector:
  kubernetes.io/arch: amd64

## RBAC configuration (Required for K3s/Kubernetes)
rbac:
  create: true
