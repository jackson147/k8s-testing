gitlab-runner:
  gitlabUrl: https://gitlab.com/

  runners:
    secret: gitlab-arm-runner-secret
    
    config: |
      [[runners]]
        name = "k3s-arm64-runner"
        executor = "kubernetes"
        # Fixes the long polling warning
        request_concurrency = 4
        [runners.kubernetes]
          image = "alpine:latest"
          privileged = true
          namespace = "gitlab"
          [runners.kubernetes.node_selector]
            "kubernetes.io/arch" = "arm64"
          cpu_requests = "1000m"
          memory_requests = "2Gi"

  nodeSelector:
    kubernetes.io/arch: amd64

  rbac:
    create: true