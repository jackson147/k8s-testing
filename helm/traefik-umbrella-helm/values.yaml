traefik:
  # 1. globalArguments is removed. Moved these flags to additionalArguments.
  additionalArguments:
    - "--global.sendanonymoususage=false"
    - "--global.checknewversion=false"
    - "--providers.kubernetescrd.allowCrossNamespace=true"
    - "--serversTransport.insecureSkipVerify=true"
    - "--log.level=INFO"
    - "--log.format=json"
    - "--accesslog.format=json"
    - "--accesslog=true"

  deployment:
    enabled: true
    replicas: 1
    annotations: {}
    podAnnotations: {}
    additionalContainers: []
    initContainers: []

  ports:
    web:
      http:
        redirections:
          entryPoint:
            to: websecure
            scheme: https
            permanent: true
            
    websecure:
      native:
        advertisedPort: 443
        http3: 
          enabled: true
      http:
        tls:
          enabled: true

    unifi-inform:
      port: 8080
      exposedPort: 8080
      protocol: TCP
    unifi-stun:
      port: 3478
      exposedPort: 3478
      protocol: UDP
    unifi-discovery:
      port: 10001
      exposedPort: 10001
      protocol: UDP
    metrics:
      port: 9100
      exposedPort: 9100
      protocol: TCP
    traefik:
      port: 8081
      exposedPort: 8081

  metrics:
    prometheus:
      service:
        enabled: true
        
  ingressRoute:
    dashboard:
      enabled: false

  providers:
    kubernetesCRD:
      enabled: true
      ingressClass: traefik-external
      allowExternalNameServices: true
    kubernetesIngress:
      enabled: true
      allowExternalNameServices: true
      publishedService:
        enabled: false

  rbac:
    enabled: true

  service:
    enabled: true
    type: LoadBalancer
    annotations: {}
    labels: {}
    loadBalancerSourceRanges: []
    externalIPs: []